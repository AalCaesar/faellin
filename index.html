<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jawa Kampung</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: "Inter", sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #0f172a;
    padding: 20px;
}

/* CARD */
.container {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.15);
    padding: 22px;
    border-radius: 18px;
    text-align: center;
    width: 100%;
    max-width: 420px;
    color: white;
}

/* TITLE */
h1 {
    font-size: 1.8rem;
    margin-bottom: 10px;
}

/* PHOTO */
.photo {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    margin: 15px auto;
    background-image: url('allle/jawa.png');
    background-size: cover;
    background-position: center;
    border: 2px solid rgba(255,255,255,0.3);
}

/* DESCRIPTION */
.description {
    font-size: 0.9rem;
    opacity: 0.85;
    margin-bottom: 10px;
}

/* SONG INFO */
.song-info {
    margin: 10px 0;
}

.song-title {
    font-weight: 600;
}

.song-artist {
    font-size: 0.8rem;
    opacity: 0.7;
}

/* GIF */
.gif {
    width: 100px;
    border-radius: 10px;
    margin: 10px auto;
    display: block;
}

/* CONTROLS */
.controls {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
}

.time {
    font-size: 11px;
    opacity: 0.8;
}

/* PROGRESS */
.progress {
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,0.2);
    border-radius: 20px;
    cursor: pointer;
}

.bar {
    height: 100%;
    width: 0%;
    background: white;
    border-radius: 20px;
}

/* BUTTONS */
.buttons {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 12px;
}

button {
    padding: 8px 12px;
    border: none;
    border-radius: 10px;
    background: white;
    color: #0f172a;
    font-weight: 600;
    cursor: pointer;
}

/* VOLUME */
.volume {
    margin-top: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
}

.volume input {
    flex: 1;
}

/* MOBILE */
@media (max-width: 480px) {
    .controls {
        flex-direction: column;
    }
    .progress {
        width: 100%;
    }
}
</style>
</head>

<body>

<div class="container">

    <h1>Jawa Kampung</h1>

    <div class="photo"></div>

    <div class="song-info">
        <div class="song-title">Heaven</div>
        <div class="song-artist">Jawa Kampung</div>
    </div>

    <div class="description">
        Holla This is Jawa Kampung<br>
        She's alay, jamet, annoying, weird<br>
        Sekian, Terima Kasih<br>
        CARAMEL AMA BUTTERSCOTH GUE KAPANN???
    </div>

    <img src="https://media1.tenor.com/m/Xn3TfHpAJiMAAAAd/scuba-cat-scuba.gif" class="gif">

    <!-- PROGRESS -->
    <div class="controls">
        <span class="time" id="current">0:00</span>

        <div class="progress" id="progress">
            <div class="bar" id="bar"></div>
        </div>

        <span class="time" id="duration">0:00</span>
    </div>

    <!-- BUTTONS -->
    <div class="buttons">
        <button id="prev">Prev</button>
        <button id="playBtn">Play</button>
        <button id="next">Next</button>
        <button id="loopBtn">Loop</button>
    </div>

    <!-- VOLUME -->
    <div class="volume">
        🔊
        <input type="range" id="volume" min="0" max="1" step="0.01" value="0.5">
    </div>

</div>

<audio id="audio">
    <source src="allle/songs.mp3" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById("audio");
const playBtn = document.getElementById("playBtn");
const bar = document.getElementById("bar");
const progress = document.getElementById("progress");
const current = document.getElementById("current");
const duration = document.getElementById("duration");
const volume = document.getElementById("volume");
const loopBtn = document.getElementById("loopBtn");

let isPlaying = false;

// PLAY
playBtn.onclick = () => {
    if (isPlaying) {
        audio.pause();
        playBtn.textContent = "Play";
    } else {
        audio.play();
        playBtn.textContent = "Pause";
    }
    isPlaying = !isPlaying;
};

// PROGRESS
audio.addEventListener("timeupdate", () => {
    let percent = (audio.currentTime / audio.duration) * 100;
    bar.style.width = percent + "%";
    current.textContent = formatTime(audio.currentTime);
});

// DURATION
audio.addEventListener("loadedmetadata", () => {
    duration.textContent = formatTime(audio.duration);
});

// SEEK
progress.onclick = (e) => {
    const rect = progress.getBoundingClientRect();
    const pos = (e.clientX - rect.left) / rect.width;
    audio.currentTime = pos * audio.duration;
};

// VOLUME
volume.oninput = () => {
    audio.volume = volume.value;
};

// LOOP
loopBtn.onclick = () => {
    audio.loop = !audio.loop;
    loopBtn.style.opacity = audio.loop ? "1" : "0.5";
};

function formatTime(sec) {
    let m = Math.floor(sec / 60);
    let s = Math.floor(sec % 60);
    return m + ":" + s.toString().padStart(2, "0");
}
</script>

</body>
</html>
