<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jawa kampung</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fecfef);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    background: rgba(255,255,255,0.95);
    padding: 40px;
    border-radius: 25px;
    text-align: center;
    max-width: 600px;
}

/* TITLE */
h1 {
    font-size: 2.8rem;
    background: linear-gradient(135deg, #ff6b9d, #c44569);
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.photo {
    width: 260px;
    height: 260px;
    border-radius: 50%;
    margin: 25px auto;

    background-image: url('allle/jawa.png');
    background-size: cover;
    background-position: center;

    border: 6px solid white;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* TEXT */
.description {
    margin-bottom: 25px;
    font-size: 1.2rem;
}

/* PLAYER */
.player {
    margin-top: 20px;
}

.controls {
    display: flex;
    align-items: center;
    gap: 10px;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    background: #ff6b9d;
    color: white;
    cursor: pointer;
}

.progress {
    flex: 1;
    height: 6px;
    background: #eee;
    cursor: pointer;
    border-radius: 10px;
}

.bar {
    height: 100%;
    width: 0%;
    background: #ff6b9d;
    border-radius: 10px;
}

.time {
    font-size: 12px;
}
</style>
</head>

<body>

<div class="container">
    <h1>Jawa Kampung</h1>

    <img src="allle/jawa.png">

    <div class="description">
        Holla This is Jawa Kampung<br>
        Dia alay, jamet, annoying, weird<br>
        Sekian, terima kasih
    </div>

    <div class="player">
        <p><b>Heaven</b></p>

        <div class="controls">
            <span class="time" id="current">0:00</span>

            <div class="progress" id="progress">
                <div class="bar" id="bar"></div>
            </div>

            <span class="time" id="duration">0:00</span>
        </div>

        <br>
        <button id="playBtn">Play</button>
    </div>
</div>

<audio id="audio">
    <source src="allle/songs.mp3" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById('audio');
const playBtn = document.getElementById('playBtn');
const bar = document.getElementById('bar');
const progress = document.getElementById('progress');
const current = document.getElementById('current');
const duration = document.getElementById('duration');

audio.volume = 0.5;
let isPlaying = false;

// PLAY / PAUSE
playBtn.onclick = () => {
    if (isPlaying) {
        audio.pause();
        playBtn.textContent = "Play";
    } else {
        audio.play();
        playBtn.textContent = "Pause";
    }
    isPlaying = !isPlaying;
};

// UPDATE PROGRESS
audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;

    let percent = (audio.currentTime / audio.duration) * 100;
    bar.style.width = percent + "%";
    current.textContent = formatTime(audio.currentTime);
});

// DURATION
audio.addEventListener('loadedmetadata', () => {
    duration.textContent = formatTime(audio.duration);
});

// SEEK
progress.onclick = (e) => {
    const rect = progress.getBoundingClientRect();
    const pos = (e.clientX - rect.left) / rect.width;
    audio.currentTime = pos * audio.duration;
};

// FORMAT TIME
function formatTime(sec) {
    let m = Math.floor(sec / 60);
    let s = Math.floor(sec % 60);
    return m + ":" + s.toString().padStart(2, "0");
}
</script>

</body>
</html>
