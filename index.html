<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jawa Kampung</title>

<!-- SOFT & AESTHETIC FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;500&family=Inter:wght@200;300;400;500&family=Playfair+Display:ital,wght@0,300;0,400;1,300&family=Cormorant+Garamond:wght@200;300;400&family=EB+Garamond:wght@300;400&family=Spectral:wght@200;300;400&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: "Inter", "Poppins", sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    padding: 20px;
}

/* CARD */
.container {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 28px;
    border-radius: 24px;
    text-align: center;
    width: 100%;
    max-width: 420px;
    color: white;
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
}

/* TITLE - Playfair Display (elegant serif) */
h1 {
    font-family: "Playfair Display", serif;
    font-size: 2.4rem;
    font-weight: 300;
    margin-bottom: 12px;
    letter-spacing: 1px;
    color: #f8fafc;
}

/* PHOTO */
.photo {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    margin: 18px auto;
    background-image: url('allle/jawa.png');
    background-size: cover;
    background-position: center;
    border: 3px solid rgba(255,255,255,0.2);
    box-shadow: 0 8px 25px rgba(0,0,0,0.3);
}

/* DESCRIPTION - Cormorant Garamond (soft serif) */
.description {
    font-family: "Cormorant Garamond", serif;
    font-size: 1.05rem;
    font-weight: 300;
    opacity: 0.92;
    margin-bottom: 12px;
    line-height: 1.7;
    letter-spacing: 0.3px;
}

/* SONG TITLE - Spectral (soft modern serif) */
.song-title {
    font-family: "Spectral", serif;
    font-size: 1.2rem;
    font-weight: 300;
    margin-bottom: 16px;
    opacity: 0.95;
    color: #e2e8f0;
    letter-spacing: 0.5px;
}

/* GIF */
.gif {
    width: 90px;
    border-radius: 12px;
    margin: 12px auto;
    display: block;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
}

/* PROGRESS */
.controls {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 16px;
}

.time {
    font-family: "Inter", sans-serif;
    font-size: 12px;
    font-weight: 300;
    opacity: 0.85;
    letter-spacing: 0.2px;
}

.progress {
    flex: 1;
    height: 5px;
    background: rgba(255,255,255,0.15);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.3s ease;
}

.progress:hover {
    background: rgba(255,255,255,0.25);
}

.bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #a78bfa, #ec4899);
    border-radius: 10px;
    transition: width 0.3s ease;
}

/* PLAY BUTTON - EB Garamond (luxurious soft) */
button {
    font-family: "EB Garamond", serif;
    width: 100%;
    margin-top: 18px;
    padding: 14px 20px;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 16px;
    background: rgba(255,255,255,0.1);
    color: #f1f5f9;
    font-size: 1rem;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
    letter-spacing: 0.3px;
}

button:hover {
    background: rgba(255,255,255,0.2);
    border-color: rgba(255,255,255,0.4);
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(167,139,250,0.3);
}

button:active {
    transform: translateY(0);
}
</style>
</head>

<body>

<div class="container">

    <h1>Jawa Kampung</h1>

    <div class="photo"></div>

    <!-- DESKRIPSI -->
    <div class="description">
        Holla This is Jawa Kampung<br>
        She's alay, jamet, annoying, weird<br>
        Sekian, Terima Kasih<br>
        Ajakin Gue Ngopi Kocag
    </div>

    <img src="https://media1.tenor.com/m/Xn3TfHpAJiMAAAAd/scuba-cat-scuba.gif" class="gif">

    <div class="song-title">Heaven-Bryan Adams</div>

    <!-- PROGRESS -->
    <div class="controls">
        <span class="time" id="current">0:00</span>

        <div class="progress" id="progress">
            <div class="bar" id="bar"></div>
        </div>

        <span class="time" id="duration">0:00</span>
    </div>

    <button id="playBtn">▷ Play</button>
</div>

<audio id="audio">
    <source src="allle/songs.mp3" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById('audio');
const playBtn = document.getElementById('playBtn');
const bar = document.getElementById('bar');
const progress = document.getElementById('progress');
const current = document.getElementById('current');
const duration = document.getElementById('duration');

let isPlaying = false;

playBtn.onclick = () => {
    if (isPlaying) {
        audio.pause();
        playBtn.textContent = "▷ Play";
    } else {
        audio.play();
        playBtn.textContent = "⏸ Pause";
    }
    isPlaying = !isPlaying;
};

audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    let percent = (audio.currentTime / audio.duration) * 100;
    bar.style.width = percent + "%";
    current.textContent = formatTime(audio.currentTime);
});

audio.addEventListener('loadedmetadata', () => {
    duration.textContent = formatTime(audio.duration);
});

progress.onclick = (e) => {
    const rect = progress.getBoundingClientRect();
    const pos = (e.clientX - rect.left) / rect.width;
    audio.currentTime = pos * audio.duration;
};

function formatTime(sec) {
    let m = Math.floor(sec / 60);
    let s = Math.floor(sec % 60);
    return m + ":" + s.toString().padStart(2, "0");
}
</script>

</body>
</html>
