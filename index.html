<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>She's Perfect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            min-height: 100vh;
            color: #333;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 650px;
            text-align: center;
            background: rgba(255,255,255,0.95);
            padding: 60px 40px;
            border-radius: 30px;
            box-shadow: 0 25px 60px rgba(255,154,158,0.3);
        }
        
        /* Header */
        h1 {
            font-size: 3.5rem;
            font-weight: 300;
            background: linear-gradient(135deg, #ff6b9d, #c44569);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            line-height: 1.2;
        }
        
        /* PHOTO */
        .photo {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            margin: 0 auto 30px;
            background-image: url('https://images.unsplash.com/photo-1494790108755-2616b612b786?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=400&q=80');
            background-size: cover;
            background-position: center;
            border: 8px solid rgba(255,255,255,0.8);
            box-shadow: 
                0 20px 50px rgba(255,107,157,0.4),
                inset 0 2px 10px rgba(255,255,255,0.8);
            transition: all 0.4s ease;
        }
        
        .photo:hover {
            transform: scale(1.05) rotate(2deg);
            box-shadow: 
                0 30px 70px rgba(255,107,157,0.5),
                inset 0 3px 15px rgba(255,255,255,0.9);
        }
        
        /* Description */
        .description {
            font-size: 1.4rem;
            color: #555;
            margin-bottom: 40px;
            line-height: 1.7;
            font-weight: 300;
        }
        
        /* Music Player */
        .music-player {
            background: white;
            padding: 35px;
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.12);
            margin-bottom: 40px;
        }
        
        .music-art {
            width: 180px;
            height: 180px;
            border-radius: 20px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #ff9a9e, #fecfef);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            box-shadow: 0 15px 40px rgba(255,154,158,0.3);
        }
        
        .song-title {
            font-size: 1.6rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        
        .song-artist {
            color: #888;
            font-size: 1.15rem;
            margin-bottom: 25px;
            font-weight: 400;
        }
        
        .audio-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
        }
        
        #playBtn {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #ff6b9d, #c44569);
            color: white;
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 12px 35px rgba(255,107,157,0.5);
        }
        
        #playBtn:hover {
            transform: scale(1.12);
        }
        
        #playBtn.playing {
            background: linear-gradient(135deg, #48bb78, #38a169);
        }
        
        .progress {
            flex: 1;
            max-width: 350px;
            height: 8px;
            background: #f0f0f0;
            border-radius: 4px;
            cursor: pointer;
            margin: 0 25px;
            position: relative;
            overflow: hidden;
        }
        
        .progress::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            border: 3px solid #ff6b9d;
            transform: translate(-50%, -50%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .progress:hover::before {
            opacity: 1;
        }
        
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #ff6b9d, #c44569);
            border-radius: 4px;
            width: 0%;
            transition: width 0.1s ease;
        }
        
        .time {
            font-size: 1rem;
            color: #666;
            font-weight: 500;
            min-width: 45px;
        }
        
        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 35px;
            margin-top: 50px;
        }
        
        .stat {
            font-size: 2.8rem;
            font-weight: bold;
            background: linear-gradient(135deg, #ff6b9d, #c44569);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .stat-label {
            font-size: 0.9rem;
            color: #888;
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 400;
        }
        
        /* Footer */
        .footer {
            margin-top: 45px;
            color: #ff9a9e;
            font-size: 1rem;
            font-weight: 400;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- MAIN TITLE -->
        <h1>She's Perfect</h1>
        
        <!-- PHOTO -->
        <div class="photo"></div>
        
        <!-- DESCRIPTION -->
        <div class="description">
            Her smile lights up my world. 
            <br>Her kindness heals my soul. 
            <br>Her strength inspires me daily. 
            <br>In every way, she's perfect for me.
        </div>
        
        <!-- MUSIC PLAYER (Perfect - Ed Sheeran) -->
        <div class="music-player">
            <div class="music-art">🎵</div>
            <div class="song-title">Perfect</div>
            <div class="song-artist">Ed Sheeran</div>
            <div class="audio-controls">
                <span class="time" id="currentTime">0:00</span>
                <div class="progress" id="progress">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <span class="time" id="duration">3:10</span>
                <button id="playBtn">▶</button>
            </div>
        </div>
        
        <!-- STATS -->
        <div class="stats">
            <div>
                <div class="stat">∞</div>
                <div class="stat-label">Forever</div>
            </div>
            <div>
                <div class="stat">100%</div>
                <div class="stat-label">Perfect</div>
            </div>
            <div>
                <div class="stat">1</div>
                <div class="stat-label">Soulmate</div>
            </div>
        </div>
        
        <!-- FOOTER -->
        <div class="footer">
            <p>Muhammad Slamet Nur Alif ❤️ 2024</p>
        </div>
    </div>

    <script>
        // Perfect by Ed Sheeran - Official Spotify Preview
        const audio = new Audio('https://p.scdn.co/mp3-preview/3jK9uowByyKACSD1IAAWku%2F128.mp3?cid=774b29d4f13844c495f206cafdad9c86');
        const playBtn = document.getElementById('playBtn');
        const progress = document.getElementById('progress');
        const progressBar = document.getElementById('progressBar');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');

        let isPlaying = false;

        // Play/Pause Toggle
        playBtn.addEventListener('click', () => {
            if (isPlaying) {
                audio.pause();
                playBtn.textContent = '▶';
                playBtn.classList.remove('playing');
            } else {
                audio.play();
                playBtn.textContent = '⏸';
                playBtn.classList.add('playing');
            }
            isPlaying = !isPlaying;
        });

        // Progress Bar Update
        audio.addEventListener('timeupdate', () => {
            const progressPercent = (audio.currentTime / audio.duration) * 100;
            progressBar.style.width = progressPercent + '%';
            currentTimeEl.textContent = formatTime(audio.currentTime);
        });

        // Progress Bar Click
        progress.addEventListener('click', (e) => {
            const rect = progress.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            audio.currentTime = pos * audio.duration;
        });

        // Time Format
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // Audio Events
        audio.addEventListener('loadedmetadata', () => {
            durationEl.textContent = formatTime(audio.duration);
        });

        audio.addEventListener('ended', () => {
            playBtn.textContent = '▶';
            playBtn.classList.remove('playing');
            isPlaying = false;
            progressBar.style.width = '0%';
            currentTimeEl.textContent = '0:00';
        });

        // Keyboard Support
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                playBtn.click();
            }
        });
    </script>
</body>
</html>
