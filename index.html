<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jawa Kampung - Premium Edition</title>

<!-- FONTS PREMIUM -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: "Inter", sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    background: linear-gradient(135deg, #f8cdda 0%, #a8edea 25%, #fed6e3 50%, #1d2b64 100%);
    background-size: 400% 400%;
    animation: gradientShift 15s ease infinite;
    position: relative;
    overflow: hidden;
}

/* ELEMEN 1: ANIMATED BACKGROUND */
@keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* ELEMEN 2: FLOATING PARTICLES */
.particles {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
}

.particle {
    position: absolute;
    width: 6px;
    height: 6px;
    background: rgba(255,255,255,0.6);
    border-radius: 50%;
    animation: floatParticle 12s infinite linear;
}

@keyframes floatParticle {
    0% { 
        transform: translateY(100vh) rotate(0deg);
        opacity: 0;
    }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { 
        transform: translateY(-100px) rotate(360deg);
        opacity: 0;
    }
}

/* MAIN CONTAINER */
.container {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(25px);
    border: 1px solid rgba(255,255,255,0.3);
    padding: 35px;
    border-radius: 28px;
    text-align: center;
    width: 100%;
    max-width: 480px;
    box-shadow: 
        0 25px 80px rgba(0,0,0,0.3),
        inset 0 1px 0 rgba(255,255,255,0.5);
    position: relative;
    z-index: 10;
    animation: containerFloat 6s ease-in-out infinite;
}

/* ELEMEN 3: CONTAINER FLOAT */
@keyframes containerFloat {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
}

/* ELEMEN 4: NEON GLOW BORDER */
.container::before {
    content: '';
    position: absolute;
    inset: -2px;
    background: linear-gradient(45deg, #ff6b9d, #4ecdc4, #45b7d1, #f9ca24, #ff6b9d);
    border-radius: 30px;
    z-index: -1;
    filter: blur(12px);
    animation: neonRotate 3s linear infinite;
}

@keyframes neonRotate {
    0% { filter: hue-rotate(0deg); }
    100% { filter: hue-rotate(360deg); }
}

h1 {
    font-size: 2.3rem;
    font-weight: 700;
    background: linear-gradient(135deg, #fff, #f0f0f0);
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 2px;
    margin-bottom: 5px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.3);
}

/* ELEMEN 5: PHOTO 3D EFFECT */
.photo {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    margin: 25px auto;
    background-image: url('allle/jawa.png');
    background-size: cover;
    background-position: center;
    border: 5px solid rgba(255,255,255,0.6);
    box-shadow: 
        0 15px 45px rgba(0,0,0,0.3),
        inset 0 0 20px rgba(255,255,255,0.4);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    transform-style: preserve-3d;
}

.photo:hover {
    transform: scale(1.1) rotateY(10deg) rotateX(5deg);
    box-shadow: 
        0 25px 70px rgba(0,0,0,0.4),
        inset 0 0 30px rgba(255,255,255,0.6);
}

.description {
    margin: 15px 0 25px;
    font-size: 1rem;
    line-height: 1.6;
    color: rgba(255,255,255,0.95);
    font-weight: 300;
}

/* ELEMEN 6: ENHANCED GIF */
.gif-container {
    position: relative;
    margin: 20px auto;
    width: 130px;
    height: 130px;
}

.gif {
    width: 100%;
    height: 100%;
    border-radius: 20px;
    object-fit: cover;
    border: 3px solid rgba(255,255,255,0.4);
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    transition: all 0.3s ease;
    animation: gifBounce 2s infinite;
}

@keyframes gifBounce {
    0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-8px); }
    60% { transform: translateY(-4px); }
}

.gif:hover {
    transform: scale(1.15);
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}

/* ELEMEN 7: SONG DISPLAY */
.song-display {
    background: rgba(255,255,255,0.1);
    padding: 15px 20px;
    border-radius: 18px;
    margin-bottom: 20px;
    border: 1px solid rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
}

.song-title {
    font-size: 1.1rem;
    font-weight: 500;
    color: white;
    margin-bottom: 5px;
}

.song-artist {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.7);
}

/* ELEMEN 8: ADVANCED CONTROLS */
.player {
    margin-top: 15px;
}

.main-controls {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 15px;
}

.icon-btn {
    width: 45px;
    height: 45px;
    border: none;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    color: white;
    cursor: pointer;
    font-size: 1rem;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.3);
}

.icon-btn:hover {
    background: rgba(255,255,255,0.4);
    transform: scale(1.1) translateY(-2px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

.play-pause-btn {
    width: 55px;
    height: 55px;
    background: white;
    color: #1d2b64;
    font-size: 1.2rem;
    font-weight: 600;
}

.play-pause-btn:hover {
    transform: scale(1.15) translateY(-3px);
    box-shadow: 0 15px 35px rgba(0,0,0,0.4);
}

.time {
    font-size: 12px;
    color: rgba(255,255,255,0.9);
    font-weight: 500;
    min-width: 45px;
}

/* ELEMEN 9: PREMIUM PROGRESS */
.progress-container {
    background: rgba(255,255,255,0.1);
    padding: 12px;
    border-radius: 20px;
    margin: 15px 0;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
}

.progress {
    height: 6px;
    background: rgba(255,255,255,0.3);
    border-radius: 10px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
}

.progress::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    bottom: 0;
    width: 2px;
    background: rgba(255,255,255,0.5);
    transform: translateX(-100%);
    animation: progressShine 2s infinite;
}

@keyframes progressShine {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
}

.bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #fff, rgba(255,255,255,0.8));
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(255,255,255,0.5);
    transition: width 0.2s ease;
}

/* ELEMEN 10: VOLUME SLIDER */
.volume-container {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.1);
    padding: 12px 18px;
    border-radius: 20px;
    margin-top: 10px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
}

.volume-slider {
    flex: 1;
    height: 5px;
    background: rgba(255,255,255,0.3);
    border-radius: 10px;
    outline: none;
    cursor: pointer;
    appearance: none;
}

.volume-slider::-webkit-slider-thumb {
    appearance: none;
    width: 20px;
    height: 20px;
    background: white;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    transition: transform 0.2s;
}

.volume-slider::-webkit-slider-thumb:hover {
    transform: scale(1.2);
}

.volume-value {
    font-size: 11px;
    color: rgba(255,255,255,0.9);
    font-weight: 500;
    min-width: 35px;
}

/* ELEMEN 11: MAIN PLAY BUTTON */
.main-play-btn {
    width: 100%;
    margin-top: 20px;
    padding: 14px 24px;
    border: none;
    border-radius: 16px;
    background: linear-gradient(135deg, #fff 0%, #f8f9fa 100%);
    color: #1d2b64;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    position: relative;
    overflow: hidden;
}

.main-play-btn::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
    transition: left 0.6s;
}

.main-play-btn:hover::before {
    left: 100%;
}

.main-play-btn:hover {
    transform: translateY(-4px) scale(1.02);
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
}

/* ELEMEN 12: RESPONSIVE */
@media (max-width: 480px) {
    .container {
        padding: 25px 20px;
        margin: 10px;
    }
    
    h1 {
        font-size: 1.8rem;
    }
    
    .main-controls {
        flex-direction: column;
        gap: 15px;
    }
    
    .progress-container {
        padding: 10px;
    }
}

/* ELEMEN 13: LOADING SPINNER */
.loading {
    display: none;
    width: 30px;
    height: 30px;
    border: 3px solid rgba(255,255,255,0.3);
    border-top: 3px solid white;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 10px auto;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
</style>
</head>

<body>
<!-- ELEMEN 2: PARTICLES -->
<div class="particles" id="particles"></div>

<div class="container">
    <h1><i class="fas fa-music"></i> Jawa Kampung</h1>

    <!-- ELEMEN 5: 3D PHOTO -->
    <div class="photo"></div>

    <div class="description">
        Holla This is Jawa Kampung<br>
        She's alay, jamet, annoying, weird<br>
        Sekian, Terima Kasih 
    </div>

    <!-- ELEMEN 6: GIF -->
    <div class="gif-container">
        <img src="https://media1.tenor.com/m/Xn3TfHpAJiMAAAAd/scuba-cat-scuba.gif" class="gif" id="mainGif">
    </div>

    <!-- ELEMEN 7: SONG DISPLAY -->
    <div class="song-display">
        <div class="song-title">Heaven</div>
        <div class="song-artist">Jawa Kampung</div>
    </div>

    <div class="player">
        <!-- ELEMEN 8: MAIN CONTROLS -->
        <div class="main-controls">
            <button class="icon-btn" id="prevBtn" title="Previous"><i class="fas fa-step-backward"></i></button>
            <button class="play-pause-btn" id="playBtn" title="Play">▶</button>
            <button class="icon-btn" id="nextBtn" title="Next"><i class="fas fa-step-forward"></i></button>
        </div>

        <!-- ELEMEN 9: PROGRESS -->
        <div class="progress-container">
            <span class="time" id="current">0:00</span>
            <div class="progress" id="progress">
                <div class="bar" id="bar"></div>
            </div>
            <span class="time" id="duration">0:00</span>
        </div>

        <!-- ELEMEN 10: VOLUME -->
        <div class="volume-container">
            <i class="fas fa-volume-up"></i>
            <input type="range" class="volume-slider" id="volume" min="0" max="1" step="0.01" value="0.5">
            <span class="volume-value" id="volumeValue">50%</span>
        </div>

        <!-- ELEMEN 13: LOADING -->
        <div class="loading" id="loading"></div>

        <!-- ELEMEN 11: MAIN BUTTON -->
        <button class="main-play-btn" id="mainPlayBtn">
            <i class="fas fa-play"></i> Play Now
        </button>
    </div>
</div>

<audio id="audio">
    <source src="allle/songs.mp3" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById('audio');
const playBtn = document.getElementById('playBtn');
const mainPlayBtn = document.getElementById('mainPlayBtn');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const bar = document.getElementById('bar');
const progress = document.getElementById('progress');
const current = document.getElementById('current');
const duration = document.getElementById('duration');
const volume = document.getElementById('volume');
const volumeValue = document.getElementById('volumeValue');
const loading = document.getElementById('loading');
const mainGif = document.getElementById('mainGif');
const particles = document.getElementById('particles');

audio.volume = 0.5;
let isPlaying = false;

// ELEMEN 2: CREATE PARTICLES
function createParticle() {
    const particle = document.createElement('div');
    particle.className = 'particle';
    particle.style.left = Math.random() * 100 + '%';
    particle.style.animationDuration = (Math.random() * 5 + 7) + 's';
    particle.style.width = particle.style.height = (Math.random() * 4 + 3) + 'px';
    particles.appendChild(particle);
    
    setTimeout(() => particle.remove(), 12000);
}
setInterval(createParticle, 400);
