<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jawa Kampung</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 15px;
    background: linear-gradient(135deg, #ff9a9e, #fecfef);
}

/* CONTAINER */
.container {
    background: rgba(255,255,255,0.95);
    padding: 20px;
    border-radius: 20px;
    text-align: center;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
}

/* TITLE */
h1 {
    font-size: clamp(1.6rem, 5vw, 2.3rem);
    background: linear-gradient(135deg, #ff6b9d, #c44569);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* FOTO */
.photo {
    width: 55vw;
    height: 55vw;
    max-width: 200px;
    max-height: 200px;
    border-radius: 50%;
    margin: 20px auto;
    background-image: url('allle/jawa.png');
    background-size: cover;
    background-position: center;
    border: 4px solid white;
}

/* TEXT */
.description {
    font-size: clamp(0.9rem, 3vw, 1.1rem);
    margin-bottom: 10px;
    line-height: 1.4;
}

/* GIF */
.gif {
    width: 80%;
    max-width: 220px;
    margin: 15px auto;
    display: block;
    border-radius: 12px;
    transition: 0.3s;
}

.gif:hover {
    transform: scale(1.05);
}

/* PLAYER */
.controls {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
}

.progress {
    flex: 1;
    height: 5px;
    background: #ddd;
    border-radius: 10px;
    cursor: pointer;
}

.bar {
    height: 100%;
    width: 0%;
    background: #ff6b9d;
    border-radius: 10px;
}

.time {
    font-size: 11px;
}

/* BUTTON */
button {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: #ff6b9d;
    color: white;
    cursor: pointer;
}

/* MOBILE */
@media (max-width: 480px) {
    .controls {
        flex-direction: column;
    }

    .progress {
        width: 100%;
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>Jawa Kampung</h1>

    <div class="photo"></div>

    <div class="description">
        Holla This is Jawa Kampung<br>
        Dia alay, jamet, annoying, weird<br>
        Sekian, Terima Kasih
    </div>

    <!-- GIF DI SINI -->
    <img
        src="https://media1.tenor.com/m/Xn3TfHpAJiMAAAAd/scuba-cat-scuba.gif" 
        class="gif" 
        style="width:30%; max-width:120px; display:block; margin:auto;">

    <div class="player">
        <p><b>Heaven</b></p>

        <div class="controls">
            <span class="time" id="current">0:00</span>

            <div class="progress" id="progress">
                <div class="bar" id="bar"></div>
            </div>

            <span class="time" id="duration">0:00</span>
        </div>

        <button id="playBtn">Play</button>
    </div>
</div>

<audio id="audio">
    <source src="allle/songs.mp3" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById('audio');
const playBtn = document.getElementById('playBtn');
const bar = document.getElementById('bar');
const progress = document.getElementById('progress');
const current = document.getElementById('current');
const duration = document.getElementById('duration');

let isPlaying = false;

// PLAY
playBtn.onclick = () => {
    if (isPlaying) {
        audio.pause();
        playBtn.textContent = "Play";
    } else {
        audio.play();
        playBtn.textContent = "Pause";
    }
    isPlaying = !isPlaying;
};

// PROGRESS
audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;

    let percent = (audio.currentTime / audio.duration) * 100;
    bar.style.width = percent + "%";
    current.textContent = formatTime(audio.currentTime);
});

// DURATION
audio.addEventListener('loadedmetadata', () => {
    duration.textContent = formatTime(audio.duration);
});

// SEEK
progress.onclick = (e) => {
    const rect = progress.getBoundingClientRect();
    const pos = (e.clientX - rect.left) / rect.width;
    audio.currentTime = pos * audio.duration;
};

// FORMAT TIME
function formatTime(sec) {
    let m = Math.floor(sec / 60);
    let s = Math.floor(sec % 60);
    return m + ":" + s.toString().padStart(2, "0");
}
</script>

</body>
</html>
