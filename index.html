<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jawa Kampung</title>

<!-- FONT AESTHETIC -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: "Inter", sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    background: linear-gradient(135deg, #f8cdda, #1d2b64);
}

/* CARD */
.container {
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.2);
    padding: 22px;
    border-radius: 22px;
    text-align: center;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
}

/* TITLE */
h1 {
    font-size: 2rem;
    font-weight: 600;
    color: white;
    letter-spacing: 1px;
}

/* PHOTO */
.photo {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    margin: 18px auto;
    background-image: url('allle/jawa.png');
    background-size: cover;
    background-position: center;
    border: 3px solid rgba(255,255,255,0.5);
}

/* DESKRIPSI (TIDAK DIUBAH) */
.description {
    margin: 10px 0 15px;
    font-size: 0.95rem;
    line-height: 1.5;
    color: rgba(255,255,255,0.9);
}

/* GIF */
.gif {
    width: 110px;
    margin: 10px auto;
    display: block;
    border-radius: 14px;
    opacity: 0.95;
}

/* PLAYER */
.player {
    margin-top: 12px;
}

.controls {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
}

.time {
    font-size: 11px;
    color: rgba(255,255,255,0.8);
}

/* PROGRESS */
.progress {
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,0.2);
    border-radius: 20px;
    cursor: pointer;
}

.bar {
    height: 100%;
    width: 0%;
    background: white;
    border-radius: 20px;
}

/* BUTTON */
button {
    width: 100%;
    margin-top: 12px;
    padding: 10px;
    border: none;
    border-radius: 12px;
    background: white;
    color: #1d2b64;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.03);
}

/* MOBILE */
@media (max-width: 480px) {
    .controls {
        flex-direction: column;
    }

    .progress {
        width: 100%;
    }
}
</style>
</head>

<body>

<div class="container">

    <h1>Jawa Kampung</h1>

    <div class="photo"></div>

    <!-- DESKRIPSI TIDAK DIUBAH -->
    <div class="description">
        Holla This is Jawa Kampung<br>
        Dia alay, jamet, annoying, weird<br>
        Sekian, Terima Kasih
    </div>

    <img src="https://media1.tenor.com/m/Xn3TfHpAJiMAAAAd/scuba-cat-scuba.gif" class="gif">

    <div class="player">

        <div class="controls">
            <span class="time" id="current">0:00</span>

            <div class="progress" id="progress">
                <div class="bar" id="bar"></div>
            </div>

            <span class="time" id="duration">0:00</span>
        </div>

        <button id="playBtn">Play</button>
    </div>
</div>

<audio id="audio">
    <source src="allle/songs.mp3" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById('audio');
const playBtn = document.getElementById('playBtn');
const bar = document.getElementById('bar');
const progress = document.getElementById('progress');
const current = document.getElementById('current');
const duration = document.getElementById('duration');

let isPlaying = false;

playBtn.onclick = () => {
    if (isPlaying) {
        audio.pause();
        playBtn.textContent = "Play";
    } else {
        audio.play();
        playBtn.textContent = "Pause";
    }
    isPlaying = !isPlaying;
};

audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;

    let percent = (audio.currentTime / audio.duration) * 100;
    bar.style.width = percent + "%";
    current.textContent = formatTime(audio.currentTime);
});

audio.addEventListener('loadedmetadata', () => {
    duration.textContent = formatTime(audio.duration);
});

progress.onclick = (e) => {
    const rect = progress.getBoundingClientRect();
    const pos = (e.clientX - rect.left) / rect.width;
    audio.currentTime = pos * audio.duration;
};

function formatTime(sec) {
    let m = Math.floor(sec / 60);
    let s = Math.floor(sec % 60);
    return m + ":" + s.toString().padStart(2, "0");
}
</script>

</body>
</html>
