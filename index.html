<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jawa Kampung</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(-45deg, #ff9a9e, #fecfef, #fecfef, #ff9a9e);
    background-size: 400% 400%;
    animation: gradientShift 15s ease infinite;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow-x: hidden;
    position: relative;
}

@keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.particles {
    position: fixed;
    width: 100%;
    height: 100%;
    pointer-events: none;
}

.particle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: rgba(255, 107, 157, 0.6);
    border-radius: 50%;
    animation: float 6s infinite linear;
}

@keyframes float {
    0% { transform: translateY(100vh); opacity: 0; }
    10% { opacity: 1; }
    100% { transform: translateY(-100px); opacity: 0; }
}

.container {
    background: rgba(255,255,255,0.95);
    padding: 40px;
    border-radius: 25px;
    text-align: center;
    max-width: 600px;
    position: relative;
    z-index: 10;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
}

h1 {
    font-size: 2.5rem;
    color: #c44569;
}

.photo {
    width: 250px;
    height: 250px;
    border-radius: 50%;
    margin: 25px auto;
    background-image: url('allle/jawa.png'); /* ✅ FIX */
    background-size: cover;
    background-position: center;
    border: 6px solid white;
    box-shadow: 0 10px 30px rgba(255, 107, 157, 0.3);
}

.description {
    margin-bottom: 25px;
    font-size: 1.2rem;
    color: #555;
}

button {
    padding: 12px 25px;
    border: none;
    border-radius: 30px;
    background: #ff6b9d;
    color: white;
    cursor: pointer;
    font-size: 1rem;
}

.progress {
    height: 8px;
    background: #eee;
    border-radius: 10px;
    margin: 10px 0;
    cursor: pointer;
}

.bar {
    height: 100%;
    width: 0%;
    background: #ff6b9d;
    border-radius: 10px;
}

.time {
    font-size: 14px;
    color: #666;
}

.volume-container {
    margin-top: 10px;
}

.volume-slider {
    width: 120px;
}
</style>
</head>

<body>

<div class="particles" id="particles"></div>

<div class="container">
    <h1>Jawa Kampung</h1>

    <div class="photo"></div>

    <div class="description">
        Holla This is Jawa Kampung<br>
        Dia alay, jamet, annoying, weird<br>
        Sekian, terima kasih
    </div>

    <p><b>Heaven</b></p>

    <span class="time" id="current">0:00</span>
    <div class="progress" id="progress">
        <div class="bar" id="bar"></div>
    </div>
    <span class="time" id="duration">0:00</span>

    <br><br>
    <button id="playBtn">Play</button>

    <div class="volume-container">
        <input type="range" id="volume" class="volume-slider" min="0" max="1" step="0.1" value="0.5">
    </div>
</div>

<script>
const audio = new Audio('allle/heaven.mp3'); // ✅ FIX
const playBtn = document.getElementById('playBtn');
const bar = document.getElementById('bar');
const progress = document.getElementById('progress');
const current = document.getElementById('current');
const duration = document.getElementById('duration');
const volume = document.getElementById('volume');
const particles = document.getElementById('particles');

audio.volume = 0.5;
let isPlaying = false;

// particles
function createParticle() {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    particles.appendChild(p);
    setTimeout(() => p.remove(), 6000);
}
setInterval(createParticle, 300);

// play pause
playBtn.onclick = () => {
    if (isPlaying) {
        audio.pause();
        playBtn.textContent = "Play";
    } else {
        audio.play();
        playBtn.textContent = "Pause";
    }
    isPlaying = !isPlaying;
};

// progress
audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    let percent = (audio.currentTime / audio.duration) * 100;
    bar.style.width = percent + "%";
    current.textContent = formatTime(audio.currentTime);
});

audio.addEventListener('loadedmetadata', () => {
    duration.textContent = formatTime(audio.duration);
});

progress.onclick = (e) => {
    const rect = progress.getBoundingClientRect();
    const pos = (e.clientX - rect.left) / rect.width;
    audio.currentTime = pos * audio.duration;
};

volume.oninput = () => {
    audio.volume = volume.value;
};

function formatTime(sec) {
    let m = Math.floor(sec / 60);
    let s = Math.floor(sec % 60);
    return m + ":" + s.toString().padStart(2, "0");
}
</script>

</body>
</html>
