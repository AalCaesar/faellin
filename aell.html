<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>She's Perfect</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fecfef);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    background: white;
    padding: 40px;
    border-radius: 25px;
    text-align: center;
    max-width: 600px;
}

/* TEXT */
h1 {
    font-size: 2.8rem;
    background: linear-gradient(135deg, #ff6b9d, #c44569);
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.description {
    margin: 20px 0;
}

/* PHOTO */
.photo {
    width: 250px;
    height: 250px;
    border-radius: 50%;
    margin: 20px auto;

    /* 🔥 FIXED IMAGE */
    background-image: url('allle/jawa.jpeg');
    background-size: cover;
    background-position: center;

    border: 6px solid white;
}

/* PLAYER */
.player {
    margin-top: 20px;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    background: #ff6b9d;
    color: white;
    cursor: pointer;
}

.progress {
    width: 100%;
    height: 6px;
    background: #eee;
    margin: 10px 0;
    cursor: pointer;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: #ff6b9d;
}

.time {
    font-size: 12px;
}
</style>
</head>

<body>

<div class="container">
    <h1>She's Perfect</h1>

    <div class="photo"></div>

    <div class="description">
        Her smile lights up my world.<br>
        Her kindness heals my soul.<br>
        Her strength inspires me daily.
    </div>

    <div class="player">
        <p><b>Heaven</b></p>

        <span id="current">0:00</span>

        <div class="progress" id="progress">
            <div class="progress-bar" id="bar"></div>
        </div>

        <span id="duration">0:00</span><br><br>

        <button id="play">Play</button>
    </div>
</div>

<script>
/* 🔥 FIXED AUDIO PATH */
const audio = new Audio('allle/Heaven.mp3');
audio.volume = 0.5;

const playBtn = document.getElementById('play');
const bar = document.getElementById('bar');
const progress = document.getElementById('progress');
const current = document.getElementById('current');
const duration = document.getElementById('duration');

let playing = false;

playBtn.onclick = () => {
    if (playing) {
        audio.pause();
        playBtn.textContent = "Play";
    } else {
        audio.play();
        playBtn.textContent = "Pause";
    }
    playing = !playing;
};

audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;

    let percent = (audio.currentTime / audio.duration) * 100;
    bar.style.width = percent + "%";

    current.textContent = format(audio.currentTime);
});

audio.addEventListener('loadedmetadata', () => {
    duration.textContent = format(audio.duration);
});

progress.onclick = (e) => {
    const rect = progress.getBoundingClientRect();
    const pos = (e.clientX - rect.left) / rect.width;
    audio.currentTime = pos * audio.duration;
};

function format(sec) {
    let m = Math.floor(sec / 60);
    let s = Math.floor(sec % 60);
    return m + ":" + s.toString().padStart(2, "0");
}
</script>

</body>
</html>
